{% extends "base.html" %}
{% block title %}Player Props | Prediction Lab{% endblock %}
{% block head_meta %}
<meta name="description" content="AI-powered player prop projections — points, rebounds, assists, threes and steals for tonight's games.">
{% endblock %}
{% block extra_styles %}
<style>
.props-wrap{max-width:1400px;margin:0 auto;padding:0 16px 48px;}
.props-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#fff;border:1px solid #E2E8F0;border-radius:14px;padding:12px 16px;margin-bottom:20px;box-shadow:0 2px 8px rgba(15,23,42,0.06);}
.controls-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.tab-group{display:flex;background:#f1f5f9;border-radius:10px;padding:3px;gap:2px;}
.tab-btn{background:transparent;border:none;border-radius:8px;padding:7px 18px;font-size:0.85rem;font-weight:700;color:#475569;cursor:pointer;transition:background .15s,color .15s;}
.tab-btn.active{background:#fff;color:#0f172a;box-shadow:0 1px 4px rgba(15,23,42,0.12);}
.league-sel{background:#fff;border:1px solid #cbd5e1;border-radius:10px;padding:8px 12px;font-size:0.88rem;font-weight:600;color:#0f172a;min-width:140px;cursor:pointer;}
.load-btn{background:#2563eb;border:none;border-radius:10px;color:#fff;padding:9px 22px;font-size:0.88rem;font-weight:800;cursor:pointer;margin-left:auto;white-space:nowrap;}
.load-btn:hover{background:#1d4ed8;}
.load-btn:disabled{background:#93c5fd;cursor:default;}
/* date bubbles */
.date-bubbles-wrap{background:#fff;border:1px solid #E2E8F0;border-radius:14px;padding:10px 16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(15,23,42,0.06);display:none;align-items:center;gap:8px;}
.date-bubbles-wrap.visible{display:flex;}
.date-nav-btn{background:#f1f5f9;border:1px solid #cbd5e1;border-radius:8px;padding:6px 10px;font-size:0.8rem;font-weight:700;cursor:pointer;color:#475569;white-space:nowrap;flex-shrink:0;}
.date-nav-btn:hover{background:#e2e8f0;}
.date-nav-btn:disabled{opacity:.35;cursor:default;}
.date-bubbles{display:flex;gap:8px;overflow-x:auto;padding:2px 0;flex:1;}
.date-bubbles::-webkit-scrollbar{height:4px;}
.date-bubbles::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
.date-bubble{background:#fff;border:2px solid rgba(15,23,42,0.18);border-radius:22px;padding:7px 14px;min-width:88px;text-align:center;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:600;font-size:0.82rem;color:#0f172a;flex-shrink:0;}
.date-bubble:hover{border-color:#2563eb;}
.date-bubble.active{background:#2563eb;border-color:#2563eb;color:#fff;font-weight:700;}
.date-bubble.today-bubble{border-color:#059669;color:#059669;}
.date-bubble.active.today-bubble{background:#059669;color:#fff;}
.props-msg{text-align:center;padding:48px 20px;color:#64748b;font-size:0.95rem;background:#fff;border:1px solid #E2E8F0;border-radius:14px;}
.props-error{padding:12px 16px;border-radius:12px;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;font-size:0.88rem;margin-bottom:16px;}
/* results summary card */
.results-summary{background:#fff;border:1px solid #E2E8F0;border-radius:14px;padding:20px 24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(15,23,42,0.06);}
.rs-head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #f1f5f9;}
.rs-title{font-size:1.1rem;font-weight:800;color:#0f172a;}
.rs-date{font-size:0.82rem;color:#64748b;font-weight:600;}
/* prop type filter buttons */
.prop-filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.prop-filter-btn{background:#f1f5f9;border:1px solid #E2E8F0;border-radius:20px;padding:5px 14px;font-size:0.8rem;font-weight:700;color:#475569;cursor:pointer;transition:all .15s;white-space:nowrap;}
.prop-filter-btn:hover{border-color:#2563eb;color:#2563eb;}
.prop-filter-btn.active{background:#2563eb;border-color:#2563eb;color:#fff;}
/* season by prop table */
.season-prop-table{width:100%;border-collapse:collapse;margin-top:4px;}
.season-prop-table th{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#94a3b8;text-align:left;padding:6px 10px;border-bottom:1px solid #f1f5f9;}
.season-prop-table th:not(:first-child){text-align:center;}
.season-prop-table td{padding:8px 10px;border-bottom:1px solid #f8fafc;font-size:0.85rem;color:#0f172a;}
.season-prop-table td:not(:first-child){text-align:center;}
.season-prop-table tr:last-child td{border-bottom:none;}
.season-prop-table tr:hover td{background:#f8fafc;}
.spt-name{font-weight:700;}
.spt-pct{font-weight:800;}
.spt-pct.great{color:#059669;}
.spt-pct.ok{color:#d97706;}
.spt-pct.poor{color:#dc2626;}
.rs-top{display:flex;align-items:center;gap:20px;margin-bottom:16px;flex-wrap:wrap;}
.rs-big-rate{font-size:2.4rem;font-weight:900;color:#0f172a;line-height:1;}
.rs-big-rate.great{color:#059669;}
.rs-big-rate.ok{color:#d97706;}
.rs-big-rate.poor{color:#dc2626;}
.rs-record-label{font-size:0.88rem;color:#64748b;font-weight:600;margin-top:4px;}
.rs-divider{width:1px;height:48px;background:#E2E8F0;flex-shrink:0;}
.rs-graded{font-size:0.88rem;color:#64748b;font-weight:600;}
/* tally blocks */
.rs-tally-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.rs-tally-block{flex:1;min-width:140px;background:#f8fafc;border:1px solid #E2E8F0;border-radius:12px;padding:14px 16px;text-align:center;}
.rs-tally-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#64748b;margin-bottom:6px;}
.rs-tally-pct{font-size:2rem;font-weight:900;line-height:1;margin-bottom:4px;color:#0f172a;}
.rs-tally-pct.great{color:#059669;}
.rs-tally-pct.ok{color:#d97706;}
.rs-tally-pct.poor{color:#dc2626;}
.rs-tally-rec{font-size:0.92rem;font-weight:700;margin-bottom:3px;}
.rs-tally-total{font-size:0.72rem;color:#94a3b8;font-weight:600;}
.rs-section-label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:8px;}
.rs-by-type{display:flex;flex-wrap:wrap;gap:10px;}
.rs-type-cell{background:#f8fafc;border:1px solid #E2E8F0;border-radius:10px;padding:10px 14px;min-width:90px;text-align:center;}
.rs-type-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#64748b;margin-bottom:5px;}
.rs-type-rate{font-size:1.15rem;font-weight:800;color:#0f172a;margin-bottom:2px;}
.rs-type-rate.great{color:#059669;}
.rs-type-rate.ok{color:#d97706;}
.rs-type-rate.poor{color:#dc2626;}
.rs-type-rec{font-size:0.72rem;font-weight:700;color:#94a3b8;}
/* player cards grid */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}
@media(max-width:680px){.player-grid{grid-template-columns:1fr;}}
/* player card */
.player-card{background:#fff;border:1px solid #E2E8F0;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(15,23,42,0.07);}
.player-card-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px 12px;border-bottom:1px solid #f1f5f9;background:#fafbfc;}
.player-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;font-size:0.88rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:.5px;}
.player-name{font-size:0.95rem;font-weight:800;color:#0f172a;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.player-team{font-size:0.75rem;color:#64748b;font-weight:600;margin-top:2px;}
/* prop cells */
.prop-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));border-bottom:1px solid #f1f5f9;}
.prop-cell{display:flex;flex-direction:column;align-items:center;padding:12px 6px 10px;border-right:1px solid #f1f5f9;text-align:center;}
.prop-cell:last-child{border-right:none;}
.prop-cell.over{background:rgba(16,185,129,0.04);}
.prop-cell.under{background:rgba(239,68,68,0.04);}
.pc-type{font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#64748b;margin-bottom:4px;}
.pc-proj{font-size:1.28rem;font-weight:800;color:#0f172a;line-height:1;margin-bottom:3px;}
.over .pc-proj{color:#059669;}
.under .pc-proj{color:#dc2626;}
.pc-line{font-size:0.63rem;color:#94a3b8;margin-bottom:5px;}
.pc-pick{font-size:0.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;border-radius:5px;background:#f1f5f9;color:#475569;}
.over .pc-pick{background:rgba(16,185,129,0.15);color:#059669;}
.under .pc-pick{background:rgba(239,68,68,0.12);color:#dc2626;}
.pc-fair{font-size:0.62rem;font-weight:700;color:#64748b;margin-top:3px;}
.pc-tier{display:inline-block;font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:2px 6px;border-radius:4px;margin-top:2px;}
.pc-tier.gold{background:rgba(245,158,11,0.15);color:#b45309;border:1px solid rgba(245,158,11,0.3);}
.pc-tier.green{background:rgba(16,185,129,0.13);color:#059669;border:1px solid rgba(16,185,129,0.25);}
.pc-tier.red{background:rgba(239,68,68,0.10);color:#dc2626;border:1px solid rgba(239,68,68,0.2);}
.pc-tier.neutral{display:none;}
/* model confidence row */
.model-row{display:flex;padding:7px 10px;background:#fafbfc;}
.model-cell{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;}
.mc-lbl{font-size:0.57rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.3px;}
.mc-val{font-size:0.75rem;font-weight:700;color:#334155;}
/* result rows */
.player-record{font-size:0.78rem;font-weight:700;margin-left:auto;white-space:nowrap;padding:4px 10px;border-radius:8px;background:#f1f5f9;border:1px solid #E2E8F0;}
.rec-w{color:#059669;}
.rec-l{color:#dc2626;}
.result-rows{padding:4px 0;}
.result-row{display:grid;grid-template-columns:1fr 58px 68px 68px 64px;align-items:center;padding:9px 16px;border-bottom:1px solid #f8fafc;gap:6px;font-size:0.82rem;}
.result-row:last-child{border-bottom:none;}
.rr-prop{font-weight:700;color:#0f172a;}
.rr-pick{font-size:0.72rem;font-weight:800;text-align:center;padding:3px 6px;border-radius:5px;background:#f1f5f9;color:#475569;}
.rr-pick.over{background:rgba(16,185,129,0.13);color:#059669;}
.rr-pick.under{background:rgba(239,68,68,0.10);color:#dc2626;}
.rr-line,.rr-actual{color:#475569;text-align:center;}
.rr-lbl{display:block;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:#94a3b8;margin-bottom:1px;}
.rr-result{font-size:0.72rem;font-weight:800;text-align:center;padding:3px 6px;border-radius:5px;background:#f1f5f9;color:#64748b;}
.rr-result.hit{background:rgba(16,185,129,0.15);color:#059669;}
.rr-result.miss{background:rgba(239,68,68,0.12);color:#dc2626;}
@media(max-width:440px){.result-row{grid-template-columns:1fr 50px 58px 58px 54px;padding:8px 12px;gap:3px;font-size:0.77rem;}}
</style>
{% endblock %}
{% block content %}
<div class="props-wrap">
  <div class="props-controls">
    <div class="controls-left">
      <div class="tab-group">
        <button class="tab-btn active" id="tabProps" onclick="switchTab('props')">Props</button>
        <button class="tab-btn" id="tabResults" onclick="switchTab('results')">Results</button>
        <button class="tab-btn" id="tabDiag" onclick="switchTab('diagnostics')">Diagnostics</button>
      </div>
      <select class="league-sel" id="leagueSel" onchange="onLeagueChange()">
        <option value="">Select sport</option>
        <option>NBA</option><option>NHL</option><option>NFL</option>
        <option>MLB</option><option>NCAAB</option><option>WNBA</option>
        <option>NCAAF</option><option>NCAAW</option><option>SOCCER</option>
      </select>
    </div>
    <button class="load-btn" id="loadBtn" onclick="loadProps()">Load Props</button>
  </div>
  <div class="date-bubbles-wrap" id="dateBubblesWrap">
    <button class="date-nav-btn" id="datePrev" onclick="shiftWeek(-1)">&lsaquo; Prev</button>
    <div class="date-bubbles" id="dateBubbles"></div>
    <button class="date-nav-btn" id="dateNext" onclick="shiftWeek(1)">Next &rsaquo;</button>
  </div>
  <div id="propsError" class="props-error" style="display:none;"></div>
  <div id="propsContent">
    <div class="props-msg">Select a sport and click <strong>Load Props</strong> to see tonight's projections.</div>
  </div>
</div>
<script>
const MODEL_KEYS   = ['glicko2','trueskill','xgboost','xsharp','sharp_consensus'];
const MODEL_LABELS = ['Grinder2','Takedown','Edge','XSharp','Consensus'];
const PROP_LABELS  = {
  points:'Points', rebounds:'Rebounds', assists:'Assists', threes:'3PT Made',
  steals:'Steals', shots_on_goal:'SOG', goals:'Goals', hits:'Hits',
  strikeouts:'K', runs:'Runs', rbis:'RBI', home_runs:'HR',
  passing_yards:'Pass Yds', rushing_yards:'Rush Yds',
  receiving_yards:'Rec Yds', receptions:'Rec',
  shots:'Shots', shots_on_target:'On Tgt'
};
let _view = 'props';
let _selectedDate = '';      // YYYY-MM-DD, empty = today
let _weekOffset = 0;         // how many weeks back the bubble window is
const DATES_PER_PAGE = 7;

/* ── Date bubble helpers ── */
function _isoToday() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}
function _offsetDate(isoBase, days) {
  const d = new Date(isoBase + 'T12:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}
function _fmtBubble(iso) {
  const d = new Date(iso + 'T12:00:00');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const mons = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return days[d.getDay()] + ', ' + mons[d.getMonth()] + ' ' + d.getDate();
}
function _longDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

function renderDateBubbles() {
  const today = _isoToday();
  const wrap = document.getElementById('dateBubblesWrap');
  const container = document.getElementById('dateBubbles');
  const league = document.getElementById('leagueSel').value;

  // Hide bubbles if no league selected
  if (!league) { wrap.classList.remove('visible'); return; }
  wrap.classList.add('visible');

  // Build the 7-day window ending at (today + weekOffset*7)
  const windowEnd = _offsetDate(today, _weekOffset * DATES_PER_PAGE);
  const dates = [];
  for (let i = DATES_PER_PAGE - 1; i >= 0; i--) {
    dates.push(_offsetDate(windowEnd, -i));
  }

  // Nav buttons
  document.getElementById('datePrev').disabled = false;
  // Don't go into the future past today
  document.getElementById('dateNext').disabled = _weekOffset >= 0;

  container.innerHTML = '';
  dates.forEach(iso => {
    const isFuture = iso > today;
    if (isFuture && _view === 'results') return; // skip future dates on results tab
    const b = document.createElement('div');
    b.className = 'date-bubble';
    if (iso === today) b.classList.add('today-bubble');
    const isActive = _selectedDate ? iso === _selectedDate : iso === today;
    if (isActive) b.classList.add('active');
    b.textContent = iso === today ? 'Today' : _fmtBubble(iso);
    b.dataset.iso = iso;
    b.onclick = () => {
      _selectedDate = iso;
      renderDateBubbles();
      if (league) loadProps();
    };
    container.appendChild(b);
  });
}

function shiftWeek(dir) {
  const newOffset = _weekOffset + dir;
  if (newOffset > 0) return; // no future
  _weekOffset = newOffset;
  // When going back, default selection to last date in new window
  if (!_selectedDate) _selectedDate = _isoToday();
  const today = _isoToday();
  const windowEnd = _offsetDate(today, _weekOffset * DATES_PER_PAGE);
  // pick last non-future date in window
  for (let i = 0; i < DATES_PER_PAGE; i++) {
    const d = _offsetDate(windowEnd, -(i));
    if (d <= today) { _selectedDate = d; break; }
  }
  renderDateBubbles();
  const league = document.getElementById('leagueSel').value;
  if (league) loadProps();
}

function onLeagueChange() {
  _selectedDate = '';
  _weekOffset = 0;
  renderDateBubbles();
}

function switchTab(v) {
  _view = v;
  _selectedDate = '';
  document.getElementById('tabProps').classList.toggle('active', v === 'props');
  document.getElementById('tabResults').classList.toggle('active', v === 'results');
  document.getElementById('tabDiag').classList.toggle('active', v === 'diagnostics');
  renderDateBubbles();
  const league = document.getElementById('leagueSel').value;
  if (league) loadProps();
}

function loadProps() {
  const league = document.getElementById('leagueSel').value;
  if (!league) return;
  const btn = document.getElementById('loadBtn');
  btn.disabled = true; btn.textContent = 'Loading…';
  setError('');
  setContent('<div class="props-msg">Loading…</div>');
  const dateParam = _selectedDate || _isoToday();
  let url;
  if (_view === 'props') {
    url = `/player-props-api/props?league=${encodeURIComponent(league)}`;
  } else if (_view === 'diagnostics') {
    url = `/player-props-api/diagnostics?league=${encodeURIComponent(league)}`;
  } else {
    url = `/player-props-api/results?league=${encodeURIComponent(league)}&date=${encodeURIComponent(dateParam)}`;
  }
  fetch(url)
    .then(r => r.ok ? r.json() : r.json().then(d => { throw new Error(d.detail || r.statusText); }))
    .then(data => {
      btn.disabled = false; btn.textContent = 'Load Props';
      if (_view === 'props') renderProps(data, league);
      else if (_view === 'diagnostics') renderDiagnostics(data, league);
      else renderResults(data, league);
    })
    .catch(err => {
      btn.disabled = false; btn.textContent = 'Load Props';
      setError(err.message || 'Props service unavailable. Please try again.');
      setContent('');
    });
}

function renderDiagnostics(data, league) {
  if (data.error) { setContent(`<div class="props-msg">${data.detail || data.error}</div>`); return; }
  const stab = data.distribution_stability || {};
  const ov   = data.overall || {};
  const stabColor = stab.label === 'good' ? '#00C076' : stab.label === 'low' ? '#f59e0b' : '#ef4444';
  let byType = '';
  for (const [pt, s] of Object.entries(data.by_prop_type || {})) {
    const isDivergent = (data.ev_hitrate_divergence_flags || []).includes(pt);
    const evColor = s.avg_ev > 2 ? '#00C076' : s.avg_ev < 0 ? '#ef4444' : '#64748b';
    byType += `<tr>
      <td style="font-weight:700;text-transform:capitalize;">${pt}${isDivergent ? ' <span style="color:#f59e0b;font-size:0.75em;">⚠ divergence</span>' : ''}</td>
      <td>${s.count}</td>
      <td style="color:${evColor};font-weight:700;">${s.avg_ev > 0 ? '+' : ''}${s.avg_ev}%</td>
      <td>${s.avg_conf}%</td>
      <td>${s.positive_ev_pct}%</td>
    </tr>`;
  }
  const featureRows = Object.entries(data.feature_importance || {})
    .map(([k, v]) => `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(15,23,42,0.06);"><span style="color:#475569;">${k.replace(/_/g,' ')}</span><span style="font-weight:700;">${v}</span></div>`)
    .join('');
  setContent(`
    <div style="max-width:780px;margin:0 auto;padding:4px 0;">
      <div style="font-size:1.1rem;font-weight:800;color:#0f172a;margin-bottom:16px;">${league} Props — ML Pipeline Diagnostics</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;">
        <div class="results-summary"><div style="font-size:0.72em;color:#64748b;text-transform:uppercase;font-weight:700;">Total Props</div><div style="font-size:1.6rem;font-weight:800;color:#0f172a;">${data.total_props}</div></div>
        <div class="results-summary"><div style="font-size:0.72em;color:#64748b;text-transform:uppercase;font-weight:700;">Avg Confidence</div><div style="font-size:1.6rem;font-weight:800;color:#0f172a;">${ov.avg_confidence}%</div></div>
        <div class="results-summary"><div style="font-size:0.72em;color:#64748b;text-transform:uppercase;font-weight:700;">Avg EV</div><div style="font-size:1.6rem;font-weight:800;color:${ov.avg_ev > 0 ? '#00C076' : '#ef4444'};">${ov.avg_ev > 0 ? '+' : ''}${ov.avg_ev}%</div></div>
        <div class="results-summary"><div style="font-size:0.72em;color:#64748b;text-transform:uppercase;font-weight:700;">Distribution</div><div style="font-size:1.6rem;font-weight:800;color:${stabColor};">${stab.label}</div><div style="font-size:0.75em;color:#64748b;">σ=${stab.prob_stddev}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
        <div class="results-summary">
          <div style="font-size:0.8rem;font-weight:700;color:#0f172a;margin-bottom:10px;">Feature Importance</div>
          ${featureRows || '<div style="color:#94a3b8;font-size:0.85em;">No data</div>'}
        </div>
        <div class="results-summary">
          <div style="font-size:0.8rem;font-weight:700;color:#0f172a;margin-bottom:6px;">EV Distribution</div>
          <div style="display:flex;gap:16px;">
            <div style="text-align:center;"><div style="font-size:1.4rem;font-weight:800;color:#00C076;">${ov.positive_ev_props}</div><div style="font-size:0.72em;color:#64748b;">Positive EV</div></div>
            <div style="text-align:center;"><div style="font-size:1.4rem;font-weight:800;color:#ef4444;">${ov.negative_ev_props}</div><div style="font-size:0.72em;color:#64748b;">Negative EV</div></div>
          </div>
          ${(data.ev_hitrate_divergence_flags||[]).length ? `<div style="margin-top:10px;font-size:0.78em;color:#f59e0b;font-weight:700;">⚠ Divergence detected: ${data.ev_hitrate_divergence_flags.join(', ')}</div>` : ''}
        </div>
      </div>
      <div class="results-summary">
        <div style="font-size:0.8rem;font-weight:700;color:#0f172a;margin-bottom:10px;">By Prop Type</div>
        <table style="width:100%;border-collapse:collapse;font-size:0.82em;">
          <thead><tr style="color:#64748b;font-size:0.75em;text-transform:uppercase;">
            <th style="text-align:left;padding:4px 0;">Type</th><th>Count</th><th>Avg EV</th><th>Avg Conf</th><th>+EV %</th>
          </tr></thead>
          <tbody>${byType}</tbody>
        </table>
      </div>
    </div>`);
}

function setError(msg) {
  const el = document.getElementById('propsError');
  el.style.display = msg ? '' : 'none';
  el.textContent = msg;
}

function setContent(html) {
  document.getElementById('propsContent').innerHTML = html;
}

function groupByPlayer(items) {
  const map = new Map();
  for (const row of items) {
    const k = row.player_id || row.player_name;
    if (!map.has(k)) map.set(k, { player_id: k, player_name: row.player_name, team: row.team, props: [] });
    map.get(k).props.push(row);
  }
  return [...map.values()];
}

function groupResultsByPlayer(items) {
  const map = new Map();
  for (const row of items) {
    const k = row.player_id || row.player_name;
    if (!map.has(k)) map.set(k, { player_id: k, player_name: row.player_name, team: row.team, results: [], hits: 0, misses: 0 });
    const g = map.get(k);
    g.results.push(row);
    if (row.result === 'HIT') g.hits++;
    else if (row.result === 'MISS') g.misses++;
  }
  return [...map.values()];
}

function initials(name) {
  return (name || '').split(' ').map(w => w[0] || '').join('').slice(0, 2).toUpperCase();
}

function fmt(pt) { return PROP_LABELS[pt] || pt.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }

function rateClass(rate) { return rate >= 60 ? 'great' : rate >= 50 ? 'ok' : 'poor'; }

/* ── Render props ── */
function renderProps(data, league) {
  const groups = groupByPlayer(data.items || []);
  if (!groups.length) { setContent(`<div class="props-msg">No props available for ${league} right now.</div>`); return; }
  let html = '<div class="player-grid">';
  for (const p of groups) {
    const avg = p.props[0]?.model_confidence || {};
    html += `<div class="player-card">
      <div class="player-card-hdr">
        <div class="player-avatar">${initials(p.player_name)}</div>
        <div><div class="player-name">${p.player_name}</div><div class="player-team">${p.team || ''}</div></div>
      </div>
      <div class="prop-row">`;
    for (const prop of p.props) {
      const side = (prop.picked_side || '').toLowerCase();
      const tier = prop.tier || 'neutral';
      const tierLabel = tier === 'gold' ? '★ Gold' : tier === 'green' ? '+ Edge' : tier === 'red' ? '− Fade' : '';
      const fairOdds = side === 'over' ? prop.fair_over_odds : prop.fair_under_odds;
      const fairStr = fairOdds != null ? (fairOdds > 0 ? '+' + fairOdds : fairOdds) : null;
      const edgeStr = prop.edge_pct != null ? (prop.edge_pct > 0 ? '+' : '') + prop.edge_pct + '% edge' : null;
      html += `<div class="prop-cell ${side}">
        <div class="pc-type">${fmt(prop.prop_type)}</div>
        <div class="pc-proj">${prop.projection ?? '—'}</div>
        <div class="pc-line">Line: ${prop._calc_line ?? prop.line ?? '—'}${edgeStr ? ' · ' + edgeStr : ''}</div>
        <div class="pc-pick">${prop.picked_side || '—'}</div>
        ${fairStr ? `<div class="pc-fair">Fair: ${fairStr}</div>` : ''}
        ${tierLabel ? `<div class="pc-tier ${tier}">${tierLabel}</div>` : ''}
      </div>`;
    }
    html += `</div><div class="model-row">`;
    for (let i = 0; i < MODEL_KEYS.length; i++) {
      const v = avg[MODEL_KEYS[i]];
      html += `<div class="model-cell"><span class="mc-lbl">${MODEL_LABELS[i]}</span><span class="mc-val">${v != null ? v + '%' : '—'}</span></div>`;
    }
    html += `</div></div>`;
  }
  html += '</div>';
  setContent(html);
}

function pct(w, l) { return (w + l) > 0 ? Math.round(w / (w + l) * 100) : 0; }
function rec(w, l) { return `<span class="rec-w">${w}</span>–<span class="rec-l">${l}</span>`; }

/* ── Render results ── */
function renderResults(data, league) {
  const groups = groupResultsByPlayer(data.items || []);
  const summary     = data.summary || {};
  const overall     = summary.overall || {};
  const byPropType  = summary.by_prop_type || {};
  const week        = data.week_summary || {};
  const season      = data.season_summary || {};

  let dateLabel = data.result_date || '';
  if (dateLabel) {
    const d = new Date(dateLabel + 'T12:00:00');
    dateLabel = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  const nightW = overall.wins || 0;
  const nightL = overall.losses || 0;
  const nightPct = pct(nightW, nightL);

  const weekW  = week.wins || 0;
  const weekL  = week.losses || 0;
  const weekPct = pct(weekW, weekL);

  const seasW  = season.wins || 0;
  const seasL  = season.losses || 0;
  const seasPct = pct(seasW, seasL);

  // "Since" label — use actual tracking start date, not "Season"
  let sinceLabel = 'All Tracked';
  if (data.tracking_since) {
    const ts = new Date(data.tracking_since + 'T12:00:00');
    sinceLabel = 'Since ' + ts.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }

  // "Last Night" label — reflects selected date
  const nightLabel = (data.result_date === _isoToday())
    ? 'Last Night'
    : (_fmtBubble(data.result_date || _isoToday()));

  let html = `<div class="results-summary">
    <div class="rs-head">
      <div class="rs-title">${league} Props — Performance &amp; Results</div>
      ${dateLabel ? `<div class="rs-date">${dateLabel}</div>` : ''}
    </div>

    <div class="rs-tally-row">
      <div class="rs-tally-block">
        <div class="rs-tally-label">${nightLabel}</div>
        <div class="rs-tally-pct ${rateClass(nightPct)}">${nightPct}%</div>
        <div class="rs-tally-rec">${rec(nightW, nightL)}</div>
        <div class="rs-tally-total">${nightW + nightL} props graded</div>
      </div>
      <div class="rs-tally-block">
        <div class="rs-tally-label">Last 7 Days</div>
        <div class="rs-tally-pct ${rateClass(weekPct)}">${weekPct}%</div>
        <div class="rs-tally-rec">${rec(weekW, weekL)}</div>
        <div class="rs-tally-total">${weekW + weekL} props graded</div>
      </div>
      <div class="rs-tally-block">
        <div class="rs-tally-label">${sinceLabel}</div>
        <div class="rs-tally-pct ${rateClass(seasPct)}">${seasPct}%</div>
        <div class="rs-tally-rec">${rec(seasW, seasL)}</div>
        <div class="rs-tally-total">${seasW + seasL} total graded</div>
      </div>
    </div>`;

  // Season by prop type table
  const seasonByProp = data.season_by_prop || {};
  const sbpEntries = Object.entries(seasonByProp);
  if (sbpEntries.length) {
    html += `<div class="rs-section-label" style="margin-top:16px;">${sinceLabel} — By Prop Type</div>
    <table class="season-prop-table">
      <thead><tr>
        <th>Prop</th><th>Hit %</th><th>Record</th><th>Graded</th>
      </tr></thead><tbody>`;
    for (const [pt, r] of sbpEntries) {
      const ptPct = pct(r.wins, r.losses);
      const total = r.wins + r.losses;
      html += `<tr>
        <td class="spt-name">${fmt(pt)}</td>
        <td class="spt-pct ${rateClass(ptPct)}">${ptPct}%</td>
        <td>${rec(r.wins, r.losses)}</td>
        <td style="color:#94a3b8;font-size:0.8rem;">${total}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }
  html += `</div>`;

  if (!groups.length) {
    html += `<div class="props-msg">No graded props for this date yet. Check back after games complete.</div>`;
    setContent(html);
    return;
  }

  // Prop type filter buttons — built from all prop types in today's items
  const allPropTypes = [...new Set(data.items.map(r => r.prop_type))];
  let _activePropFilter = 'all';

  function renderFilteredCards(filter) {
    _activePropFilter = filter;
    // Update button states
    document.querySelectorAll('.prop-filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.pt === filter);
    });
    // Re-render cards
    const cardWrap = document.getElementById('propResultCards');
    if (!cardWrap) return;
    let cards = '';
    for (const p of groups) {
      const visibleResults = filter === 'all'
        ? p.results
        : p.results.filter(r => r.prop_type === filter);
      if (!visibleResults.length) continue;
      const fHits   = visibleResults.filter(r => r.result === 'HIT').length;
      const fMisses = visibleResults.filter(r => r.result === 'MISS').length;
      cards += `<div class="player-card">
        <div class="player-card-hdr">
          <div class="player-avatar">${initials(p.player_name)}</div>
          <div style="flex:1;min-width:0;"><div class="player-name">${p.player_name}</div><div class="player-team">${p.team || ''}</div></div>
          <div class="player-record">${rec(fHits, fMisses)}</div>
        </div>
        <div class="result-rows">`;
      for (const r of visibleResults) {
        const isHit = r.result === 'HIT';
        const pick = (r.pick || '').toLowerCase();
        cards += `<div class="result-row">
          <div class="rr-prop">${fmt(r.prop_type)}</div>
          <div class="rr-pick ${pick}">${r.pick || '—'}</div>
          <div class="rr-line"><span class="rr-lbl">Line</span>${r.line ?? '—'}</div>
          <div class="rr-actual"><span class="rr-lbl">Actual</span>${r.actual ?? '—'}</div>
          <div class="rr-result ${isHit ? 'hit' : 'miss'}">${isHit ? 'HIT ✓' : 'MISS ✗'}</div>
        </div>`;
      }
      cards += `</div></div>`;
    }
    cardWrap.innerHTML = cards || `<div class="props-msg" style="grid-column:1/-1;">No ${fmt(filter)} props graded for this date.</div>`;
  }

  // Build filter buttons HTML
  let filterHtml = `<div class="prop-filter-row">
    <button class="prop-filter-btn active" data-pt="all" onclick="window._pfClick(this,'all')">All Props</button>`;
  for (const pt of allPropTypes) {
    filterHtml += `<button class="prop-filter-btn" data-pt="${pt}" onclick="window._pfClick(this,'${pt}')">${fmt(pt)}</button>`;
  }
  filterHtml += `</div>`;

  html += filterHtml + `<div class="player-grid" id="propResultCards"></div>`;
  setContent(html);

  // Wire filter click handler after DOM is set
  window._pfClick = function(btn, pt) {
    renderFilteredCards(pt);
  };
  renderFilteredCards('all');
}
</script>
{% endblock %}
